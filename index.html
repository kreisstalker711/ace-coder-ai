<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>AceCoder AI</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">

    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div class="logo-name">AceCoder <span class="logo-ai">AI</span></div>
    </div>

    <div class="model-badge">
      <div class="model-dot"></div>
      Groq Model
    </div>

  </div>
</header>


<!-- MAIN -->
<main class="main">

  <!-- CHAT AREA -->
  <div class="chat-area">

    <div class="messages" id="messages">

      <!-- empty state -->
      <div class="empty-state" id="emptyState">

        <div class="empty-icon">⚡</div>

        <div class="empty-title">
          AceCoder AI
        </div>

        <div class="empty-sub">
          Ask me to generate code, debug, or explain programming.
        </div>

      </div>

    </div>

  </div>

</main>


<!-- INPUT BAR -->
<div class="input-bar">

  <div class="input-inner">

    <div class="input-box">

      <textarea
        id="prompt"
        class="prompt-textarea"
        placeholder="Ask AceCoder AI to generate code..."
      ></textarea>

      <div class="input-actions">

        <div class="char-count" id="charCount">0</div>

        <button class="send-btn" onclick="sendPrompt()">➤</button>

      </div>

    </div>

    <div class="input-disclaimer">
      AI may make mistakes. Always review generated code.
    </div>

  </div>

</div>


<script src="script.js"></script>

</body>
</html>
